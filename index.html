<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Ormkub 會員專區</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<link rel="stylesheet" href="style.css">

</head>
<body>

<div id="loading-overlay">
  <div class="spinner-border text-primary" role="status"></div>
  <div class="mt-2 small text-muted" style="letter-spacing: 1px;">LOADING</div>
</div>

<div id="app">
  
  <div class="welcome-section">
    <div class="d-flex justify-content-between align-items-center user-info">
      <div>
        <h5>Hello, <span id="header-name">Member</span></h5>
        <p><span id="header-group">讀取中...</span></p>
      </div>
      <button onclick="forceUpdate()" class="btn-update">
        <i class="bi bi-arrow-clockwise"></i> 更新
      </button>
    </div>
  </div>

  <div id="register-view" class="container hidden fade-in" style="margin-top: 20px; position:relative; z-index:20;">
    <div class="card-box">
      <h4 class="fw-bold text-center mb-4">會員綁定</h4>
      <p class="text-center text-muted small mb-4">請填寫正確資料以啟用查詢功能</p>
      
      <form onsubmit="event.preventDefault(); doRegister();">
        <div class="mb-3">
          <label class="small text-muted ms-1">Email</label>
          <input type="email" id="reg-email" class="form-input" required placeholder="請輸入 Email">
        </div>
        <div class="mb-3">
          <label class="small text-muted ms-1">群內名稱</label>
          <input type="text" id="reg-name" class="form-input" required placeholder="請填寫完整暱稱 (需與群組一致)">
        </div>
        <div class="mb-3">
          <label class="small text-muted ms-1">收件人姓名</label>
          <input type="text" id="reg-receiver" class="form-input" required placeholder="包裹收件人">
        </div>
        <div class="mb-3">
          <label class="small text-muted ms-1">手機號碼</label>
          <input type="tel" id="reg-phone" class="form-input" required placeholder="09xxxxxxxx">
        </div>
        <div class="mb-3">
          <label class="small text-muted ms-1">取貨門市</label>
          <input type="text" id="reg-store" class="form-input" required placeholder="7-11 門市名稱">
        </div>
        
        <button type="submit" class="action-btn mt-2">確認綁定</button>
      </form>
    </div>
  </div>

  <div id="dashboard-view" class="hidden">
    
    <div class="container pb-5 pt-3">
      
      <div id="tab-home" class="content-section fade-in">
        <div id="announcement-container">
          <div class="text-center py-3 small text-muted">載入公告中...</div>
        </div>
      </div>

      <div id="tab-markets" class="content-section hidden fade-in">
        <div id="market-list"></div>
      </div>

      <div id="tab-orders" class="content-section hidden fade-in">
        <h6 class="section-title">Transactions</h6>
        
        <div class="order-notice-box">
          <div class="notice-title"><i class="bi bi-info-circle-fill me-1"></i> 訂單狀態說明</div>
          <ul class="notice-list">
            <li><span class="fw-bold">應付預收款項</span>：表示應該要預先付款的金額，每個商品已扣除 20 後的加總。</li>
            <li><span class="fw-bold" style="color: #1C8561;">配貨成功</span>：表示有購買到。</li>
            <li><span class="fw-bold" style="color: var(--accent-blue);">到台</span>：表示商品已到台。</li>
          </ul>
          <div class="notice-footer">
            ⚠️ 訂單到齊才會開賣貨便給下單，如果需要先寄出已到台的商品，請告知官方 LINE，謝謝。
          </div>
        </div>

        <div id="orders-container"></div>
      </div>

      <div id="tab-profile" class="content-section hidden fade-in">
        
        <!-- 虛擬黑卡 -->
        <div class="virtual-black-card">
          <div class="card-chip"></div>
          <div class="card-name-label">MEMBER NAME</div>
          <div class="card-name-value" id="p-group">-</div>
        </div>

        <!-- iOS 設定頁風格列表 -->
        <div class="inset-list">
          <div class="list-row">
            <span class="list-label">Email</span>
            <span class="list-value" id="p-email">-</span>
          </div>
          <div class="list-row">
            <span class="list-label">手機號碼</span>
            <span class="list-value" id="p-phone">-</span>
          </div>
          <div class="list-row">
            <span class="list-label">收件人</span>
            <span class="list-value" id="p-receiver">-</span>
          </div>
          <div class="list-row">
            <span class="list-label">取貨門市</span>
            <span class="list-value" id="p-store">-</span>
          </div>
        </div>

        <div class="mt-4">
          <a href="https://ormkub.pse.is/LINEOA527" target="_blank" class="btn-support">
            <i class="bi bi-headset"></i> 聯繫客服修改資料
          </a>
        </div>

      </div>

      <div class="text-center mt-5 mb-3">
        <span class="badge bg-light text-secondary border rounded-pill px-3 py-2" style="font-weight: normal; letter-spacing: 0.5px;">
          系統版本: <span id="app-version-display">v1.0</span>
        </span>
      </div>

    </div>
    
    <!-- 底部導航列 -->
    <nav class="bottom-nav fade-in" style="animation-delay: 0.1s;">
      <button class="nav-btn active" onclick="switchTab('home', this)">
        <i class="bi bi-house-door-fill"></i>
        <span>首頁</span>
      </button>
      <button class="nav-btn" onclick="switchTab('markets', this)">
        <i class="bi bi-bag-heart-fill"></i>
        <span>賣場</span>
      </button>
      <button class="nav-btn" onclick="switchTab('orders', this)">
        <i class="bi bi-receipt"></i>
        <span>訂單</span>
      </button>
      <button class="nav-btn" onclick="switchTab('profile', this)">
        <i class="bi bi-person-circle"></i>
        <span>資料</span>
      </button>
    </nav>

  </div>
</div>

<div class="modal fade" id="infoModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow" style="border-radius: 20px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);">
      <div class="modal-body text-center p-4">
        <h5 class="fw-bold mb-3 text-secondary">系統訊息</h5>
        <p id="m-body" class="mb-4 text-dark"></p>
        <button class="action-btn" data-bs-dismiss="modal">關閉</button>
      </div>
    </div>
  </div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="script.js"></script>

</body>
</html>
