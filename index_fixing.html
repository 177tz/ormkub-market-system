<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f14" />
  <title>Ormkub｜系統維護中</title>
  <style>
    :root{
      --bg:#0b0f14;
      --card: rgba(255,255,255,.06);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.68);
      --line: rgba(255,255,255,.12);
      --accent: #7dd3fc;
      --line-green: #06C755;
      --shadow: 0 16px 50px rgba(0,0,0,.45);
      --radius: 22px;
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, "PingFang TC", "Noto Sans TC", Segoe UI, Roboto, Helvetica, Arial;
      color:var(--text);
      background:
        radial-gradient(1200px 700px at 20% 10%, rgba(125,211,252,.12), transparent 55%),
        radial-gradient(900px 600px at 85% 35%, rgba(52,211,153,.10), transparent 55%),
        var(--bg);
      -webkit-font-smoothing: antialiased;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .card{
      width:100%;
      max-width:420px;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:36px 28px;
      text-align:center;
      backdrop-filter: blur(10px);
    }
    .icon{
      font-size:44px;
      margin-bottom:14px;
    }
    h1{
      font-size:20px;
      font-weight:700;
      margin:0 0 10px;
      color:var(--text);
    }
    p{
      font-size:14px;
      line-height:1.7;
      color:var(--muted);
      margin:0 0 26px;
    }
    .line-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      width:100%;
      padding:14px 20px;
      background:var(--line-green);
      color:#fff;
      font-weight:700;
      font-size:15px;
      text-decoration:none;
      border-radius:14px;
      box-shadow:0 8px 24px rgba(6,199,85,.35);
    }
    .line-btn:active{ opacity:.85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🛠️</div>
    <h1>系統維護中</h1>
    <p>目前系統維護中，暫時無法使用。<br>需要查詢內容，請先聯絡官方 LINE。</p>
    <a class="line-btn" href="https://ormkub.pse.is/LINEOA527" target="_blank" rel="noopener">
      聯絡官方 LINE
    </a>
  </div>
</body>
</html>
