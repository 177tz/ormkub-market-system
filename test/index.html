<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Ormkub VIP 專區</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loading-overlay">
  <div class="spinner-border" style="color: var(--accent-teal);" role="status"></div>
  <div class="mt-2 small" style="color: var(--text-sub); letter-spacing: 2px;">SYNCING...</div>
</div>

<div id="app">
  <div class="welcome-section">
    <div class="d-flex justify-content-between align-items-center user-info">
      <div>
        <p class="greeting-sub">Welcome back,</p>
        <h5 id="header-name" class="greeting-name">Member</h5>
        <p class="greeting-group"><i class="bi bi-shield-check me-1"></i><span id="header-group">讀取中...</span></p>
      </div>
      <button onclick="location.reload()" class="btn-refresh">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
    </div>
  </div>

  <div id="register-view" class="container hidden fade-in" style="margin-top: 20px; position:relative; z-index:20;">
    <div class="card-box">
      <h4 class="fw-bold text-center mb-4" style="color: var(--text-main);">會員綁定</h4>
      <p class="text-center small mb-4" style="color: var(--text-sub);">請填寫正確資料以啟用專屬查詢功能</p>
      <form onsubmit="event.preventDefault(); doRegister();">
        <div class="mb-3"><label class="input-label">Email</label><input type="email" id="reg-email" class="form-input" required></div>
        <div class="mb-3"><label class="input-label">群內名稱</label><input type="text" id="reg-name" class="form-input" required></div>
        <div class="mb-3"><label class="input-label">收件人姓名</label><input type="text" id="reg-receiver" class="form-input" required></div>
        <div class="mb-3"><label class="input-label">手機號碼</label><input type="tel" id="reg-phone" class="form-input" required></div>
        <div class="mb-3"><label class="input-label">取貨門市</label><input type="text" id="reg-store" class="form-input" required></div>
        <button type="submit" class="action-btn mt-3">確認綁定</button>
      </form>
    </div>
  </div>

  <div id="dashboard-view" class="hidden">
    <div class="container pb-5 pt-3">
      
      <div id="tab-home" class="content-section fade-in">
        <h6 class="section-title">Message Center</h6>
        <div id="announcement-container"><div class="text-center py-3 small text-muted">載入公告中...</div></div>
      </div>

      <div id="tab-markets" class="content-section hidden fade-in">
        <h6 class="section-title">VIP Markets</h6>
        <div id="market-list"></div>
      </div>

      <div id="tab-orders" class="content-section hidden fade-in">
        <h6 class="section-title">Transactions</h6>
        <div id="orders-container"></div>
      </div>

      <div id="tab-profile" class="content-section hidden fade-in">
        <h6 class="section-title">Profile</h6>
        <div class="card-box p-0 overflow-hidden">
          <div class="profile-row"><span class="p-label">群內名稱</span><span class="p-val" id="p-group">-</span></div>
          <div class="profile-row"><span class="p-label">Email</span><span class="p-val" id="p-email">-</span></div>
          <div class="profile-row"><span class="p-label">手機</span><span class="p-val" id="p-phone">-</span></div>
          <div class="profile-row"><span class="p-label">收件人</span><span class="p-val" id="p-receiver">-</span></div>
          <div class="profile-row border-0"><span class="p-label">門市</span><span class="p-val" id="p-store">-</span></div>
        </div>
        <div class="mt-4">
          <a href="https://ormkub.pse.is/LINEOA527" target="_blank" class="action-btn btn-secondary-action">
            <i class="bi bi-headset me-2"></i>聯繫客服修改資料
          </a>
        </div>
      </div>

      <div class="text-center mt-5 mb-3">
        <span class="version-badge">System v4.0 (Premium Navy)</span>
      </div>
    </div>
    
    <nav class="bottom-nav fade-in">
      <button class="nav-btn active" onclick="switchTab('home', this)"><i class="bi bi-house-door-fill"></i><span>首頁</span></button>
      <button class="nav-btn" onclick="switchTab('markets', this)"><i class="bi bi-bag-heart-fill"></i><span>賣場</span></button>
      <button class="nav-btn" onclick="switchTab('orders', this)"><i class="bi bi-wallet2"></i><span>帳務</span></button>
      <button class="nav-btn" onclick="switchTab('profile', this)"><i class="bi bi-person-circle"></i><span>資料</span></button>
    </nav>
  </div>
</div>

<div class="modal fade" id="infoModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow" style="background: var(--bg-dark); border: 1px solid var(--border-light) !important;">
      <div class="modal-body text-center p-4">
        <h5 class="fw-bold mb-3" style="color: var(--accent-gold);">系統訊息</h5>
        <p id="m-body" class="mb-4" style="color: var(--text-main);"></p>
        <button class="action-btn" data-bs-dismiss="modal">確認</button>
      </div>
    </div>
  </div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
