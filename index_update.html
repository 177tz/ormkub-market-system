<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Ormkub 會員專區</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<link rel="stylesheet" href="style.css">

</head>
<body>

<div id="loading-overlay">
  <div class="spinner-border text-primary" role="status"></div>
</div>

<div id="app">
  
  <div class="welcome-section">
    <div class="d-flex justify-content-between align-items-center user-info">
      <div>
        <h5>Hello, <span id="header-name">Member</span></h5>
        <p><span id="header-group">Loading...</span></p>
      </div>
      <button onclick="location.reload()" class="btn btn-sm btn-light rounded-pill px-3">
        <i class="bi bi-arrow-clockwise"></i> 更新
      </button>
    </div>
  </div>

  <div id="register-view" class="container hidden fade-in" style="margin-top: -40px; position:relative; z-index:20;">
    <div class="card-box">
      <h4 class="fw-bold text-center mb-4">會員綁定</h4>
      <form onsubmit="event.preventDefault(); doRegister();">
        <div class="mb-3"><label class="small text-muted ms-1">Email</label><input type="email" id="reg-email" class="form-input" required></div>
        <div class="mb-3"><label class="small text-muted ms-1">群內名稱</label><input type="text" id="reg-name" class="form-input" required placeholder="請填寫完整暱稱"></div>
        <div class="mb-3"><label class="small text-muted ms-1">收件人</label><input type="text" id="reg-receiver" class="form-input" required></div>
        <div class="mb-3"><label class="small text-muted ms-1">手機</label><input type="tel" id="reg-phone" class="form-input" required></div>
        <div class="mb-3"><label class="small text-muted ms-1">門市</label><input type="text" id="reg-store" class="form-input" required></div>
        <button class="btn-gradient mt-2">確認綁定</button>
      </form>
    </div>
  </div>

  <div id="dashboard-view" class="hidden">
    
    <div class="nav-container fade-in" style="animation-delay: 0.1s;">
      <button class="nav-btn active" onclick="switchTab('home', this)"><i class="bi bi-house-door-fill"></i> 首頁</button>
      <button class="nav-btn" onclick="switchTab('markets', this)"><i class="bi bi-bag-heart-fill"></i> 賣場</button>
      <button class="nav-btn" onclick="switchTab('orders', this)"><i class="bi bi-receipt"></i> 訂單</button>
      <button class="nav-btn" onclick="switchTab('profile', this)"><i class="bi bi-person-circle"></i> 資料</button>
    </div>

    <div class="container pb-5">
      
      <div id="tab-home" class="content-section fade-in">
        <div class="card-box" style="border-left: 5px solid var(--primary);">
          <h6 class="fw-bold text-primary mb-2"><i class="bi bi-megaphone-fill"></i> 最新公告</h6>
          <p class="small text-muted mb-0">系統已更新！現在可以查看更詳細的對帳資訊，包含後五碼與實收金額。</p>
        </div>
      </div>

      <div id="tab-markets" class="content-section hidden fade-in">
        <div id="market-list"></div>
      </div>

      <div id="tab-orders" class="content-section hidden fade-in">
        <div id="orders-container"></div>
      </div>

      <div id="tab-profile" class="content-section hidden fade-in">
        <div class="card-box">
          <div class="d-flex justify-content-between py-2 border-bottom"><span class="text-muted small">群內名稱</span><span class="fw-bold" id="p-group">-</span></div>
          <div class="d-flex justify-content-between py-2 border-bottom"><span class="text-muted small">Email</span><span class="fw-bold" id="p-email">-</span></div>
          <div class="d-flex justify-content-between py-2 border-bottom"><span class="text-muted small">手機</span><span class="fw-bold" id="p-phone">-</span></div>
          <div class="d-flex justify-content-between py-2 border-bottom"><span class="text-muted small">收件人</span><span class="fw-bold" id="p-receiver">-</span></div>
          <div class="d-flex justify-content-between py-2"><span class="text-muted small">門市</span><span class="fw-bold" id="p-store">-</span></div>
        </div>
        <div class="px-2 mt-4">
          <a href="https://ormkub.pse.is/LINEOA527" target="_blank" class="btn btn-outline-success w-100 rounded-pill py-2">
            <i class="bi bi-line me-1"></i> 聯繫客服
          </a>
        </div>
      </div>

    </div>
  </div>
</div>

<div class="modal fade" id="infoModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content border-0 shadow"><div class="modal-body text-center p-4"><p id="m-body" class="mb-3"></p><button class="btn btn-secondary btn-sm rounded-pill px-4" data-bs-dismiss="modal">關閉</button></div></div></div></div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="script.js"></script>

</body>
</html>
